<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>סקר עסקים - לשכת המסחר</title>
    <!-- Bootstrap CSS RTL -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="css/user-styles.css">
</head>
<body>
    <div class="container d-flex flex-column min-vh-100 justify-content-center">
        <header class="text-center mb-5">
            <h1 id="intro-title" class="display-4 fw-bold text-primary">טוען...</h1>
            <p id="intro-body" class="lead text-muted"></p>
        </header>

        <main class="card shadow-lg p-4 rounded-4 mx-auto w-100" style="max-width: 600px;">
            <form id="opening-form" class="needs-validation" novalidate>
                <div id="form-fields">
                    <!-- Fields injected by JS -->
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100 mt-4 rounded-pill shadow-sm">התחל בסקר</button>
            </form>
        </main>
        
        <footer class="text-center mt-5 text-muted small">
            <p>&copy; 2026 לשכת המסחר. כל הזכויות שמורות.</p>
        </footer>
    </div>

    <!-- Cookie Banner -->
    <div id="cookie-banner" class="cookie-banner d-none bg-dark text-white p-3 text-center position-fixed bottom-0 w-100 shadow-lg" style="z-index: 1050;">
        <p class="mb-2 mb-md-0 d-inline-block me-3">
            אתר זה עושה שימוש בקוקיז (Cookies) כדי להעניק לך את החוויה הטובה ביותר ולשמור את התקדמותך בסקר.
        </p>
        <button id="btn-accept-cookies" class="btn btn-primary btn-sm rounded-pill px-4">הבנתי ואישרתי</button>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/user-app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            UserApp.initIndex();
        });
    </script>
</body>
</html>
