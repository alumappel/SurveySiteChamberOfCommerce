<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>סקר עסקים - לשכת המסחר</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/user-styles.css">
</head>
<body class="bg-light">
    
    <!-- Progress Bar -->
    <div class="progress sticky-top" style="height: 10px; border-radius: 0;">
        <div id="survey-progress" class="progress-bar bg-success" role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
    </div>

    <div class="container py-5">
        <div id="survey-container" style="display: none;">
            <!-- Topics will be injected here by JS -->
        </div>

        <div id="desktop-submit-container" class="text-center mt-5 d-none">
            <span class="d-inline-block" tabindex="0" data-bs-toggle="tooltip" title="יש לדרג את כל הנושאים">
                <button id="btn-desktop-submit" class="btn btn-primary btn-lg rounded-pill px-5 shadow-sm disabled" style="pointer-events: none;">הגש סקר <i class="bi bi-chevron-left"></i></button>
            </span>
        </div>

        <div id="completion-container" class="card shadow-lg mx-auto p-5 text-center rounded-4" style="max-width: 600px; display: none;">
            <i id="completion-icon" class="bi bi-check-circle-fill text-success" style="font-size: 5rem;"></i>
            <h1 id="completion-title" class="mt-4 fw-bold">תודה רבה!</h1>
            <p id="completion-message" class="lead text-muted"></p>
            
            <div id="final-comment-section" class="mt-4">
                <label for="final-comment" class="form-label fw-bold">אם יש עוד משהו שתרצה להגיד לנו, זה הזמן:</label>
                <textarea id="final-comment" class="form-control" rows="3"></textarea>
                <button id="btn-submit-comment" class="btn btn-success mt-3 rounded-pill px-4">שלח תגובה</button>
            </div>
            
            <button id="btn-edit-survey" class="btn btn-outline-primary mt-4 rounded-pill">ערוך תשובות</button>
        </div>
    </div>

    <!-- Modals -->
    <div class="modal fade" id="welcomeBackModal" tabindex="-1" aria-labelledby="welcomeBackModalLabel" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="welcomeBackModalLabel">תודה שחזרת</h5>
                </div>
                <div class="modal-body">
                    זיהינו שהתחלת למלא את הסקר בעבר אך לא סיימת. האם תרצה להמשיך מאותה נקודה או להתחיל מההתחלה?
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-danger" id="btn-restart-survey">התחל מחדש</button>
                    <button type="button" class="btn btn-primary" id="btn-continue-survey">המשך מאיפה שעצרתי</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="idleModal" tabindex="-1" aria-labelledby="idleModalLabel" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center">
                <div class="modal-body py-5">
                    <i class="bi bi-hourglass-split text-warning" style="font-size: 3rem;"></i>
                    <h4 class="mt-3" id="idle-message">לא סיימת את השאלון, ממשיכים?</h4>
                    <button type="button" class="btn btn-primary btn-lg mt-4 px-5 rounded-pill" data-bs-dismiss="modal">המשך</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast-container position-fixed bottom-0 start-50 translate-middle-x p-3">
        <div id="survey-toast" class="toast align-items-center text-bg-primary border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="toast-message"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="סגור"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/user-app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            UserApp.initSurvey();
        });
    </script>
</body>
</html>
