<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>סקר עסקים - לשכת המסחר</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/user-styles.css">
</head>

<body class="bg-light d-flex flex-column min-vh-100 survey-page-body">
    <!-- Background Glow Blobs -->
    <div class="bg-glow-container">
        <div class="glow-blob glow-red-1"></div>
        <div class="glow-blob glow-blue-1"></div>
        <div class="glow-blob glow-red-2"></div>
        <div class="glow-blob glow-blue-2"></div>
    </div>
    <header class="w-100 text-center text-md-start bg-white shadow-sm mb-2" style="padding: 10px 0;">
        <div class="container">
            <a href="https://www.chamber.org.il/" target="_blank" rel="noopener noreferrer">
                <img src="assets/לוגו חדש_איגוד לשכת המסחר_עברית.svg" alt="לוגו לשכת המסחר" style="height: 50px; border: 0;">
            </a>
        </div>
    </header>

    <div class="container py-4 flex-grow-1 d-flex flex-column justify-content-center">
        <!-- Carousel Outer Wrapper -->
        <div class="carousel-container position-relative w-100" id="carousel-outer-container">
            <div id="survey-container" class="carousel-track" style="display: none;">
                <!-- Topics will be injected here by JS -->
            </div>

            <!-- Navigation Arrows on Desktop -->
            <button id="carousel-btn-prev" class="carousel-nav-btn prev-btn shadow" aria-label="הקודם">
                <i class="bi bi-chevron-right"></i>
            </button>
            <button id="carousel-btn-next" class="carousel-nav-btn next-btn shadow" aria-label="הבא">
                <i class="bi bi-chevron-left"></i>
            </button>
        </div>

        <div id="desktop-submit-container" class="text-center mt-4 d-none">
            <span class="d-inline-block" tabindex="0" data-bs-toggle="tooltip" title="יש לדרג את כל הנושאים">
                <button id="btn-desktop-submit" class="btn btn-primary btn-lg rounded-pill px-5 shadow-sm disabled"
                    style="pointer-events: none;">הגשת הסקר <i class="bi bi-chevron-left"></i></button>
            </span>
        </div>

        <div id="completion-container" class="card shadow-lg mx-auto p-5 text-center rounded-4"
            style="max-width: 600px; display: none;">
            <i id="completion-icon" class="bi bi-check-circle-fill text-primary" style="font-size: 5rem;"></i>
            <h1 id="completion-title" class="mt-4 fw-bold">תודה רבה!</h1>
            <p id="completion-message" class="lead text-muted"></p>

            <div id="final-comment-section" class="mt-4">
                <label for="final-comment" class="form-label fw-bold">אם יש עוד משהו שתרצה להגיד לנו, זה הזמן:</label>
                <textarea id="final-comment" class="form-control" rows="3"></textarea>
                <button id="btn-submit-comment" class="btn btn-success mt-3 rounded-pill px-4">שליחת תגובה</button>
            </div>

            <button id="btn-edit-survey" class="btn btn-outline-primary mt-4 rounded-pill">עריכת תשובות</button>
        </div>
    </div>

    <footer class="text-center mt-auto py-3 text-muted small w-100">
        <p class="mb-0">פותח ע"י אבינועם עמית יוסף <a href="https://avinoamaj.com/" target="_blank"
                class="text-decoration-none">avinoamaj.com</a></p>
    </footer>

    <!-- Modals -->
    <div class="modal fade" id="welcomeBackModal" tabindex="-1" aria-labelledby="welcomeBackModalLabel"
        aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="welcomeBackModalLabel">תודה שחזרת</h5>
                </div>
                <div class="modal-body">
                    זיהינו שהתחלת למלא את הסקר בעבר אך לא סיימת. האם תרצה/י להמשיך מאותה נקודה או להתחיל מההתחלה?
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-danger" id="btn-restart-survey">התחלה מחדש</button>
                    <button type="button" class="btn btn-primary" id="btn-continue-survey">להמשך מאותה נקודה</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="idleModal" tabindex="-1" aria-labelledby="idleModalLabel" aria-hidden="true"
        data-bs-backdrop="static" data-bs-keyboard="false">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center">
                <div class="modal-body py-5">
                    <i class="bi bi-hourglass-split text-primary" style="font-size: 3rem;"></i>
                    <h4 class="mt-3" id="idle-message">לא סיימת את השאלון, ממשיכים?</h4>
                    <button type="button" class="btn btn-primary btn-lg mt-4 px-5 rounded-pill"
                        data-bs-dismiss="modal">להמשך</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast-container position-fixed top-0 start-50 translate-middle-x p-3 mt-3">
        <div id="survey-toast" class="toast align-items-center text-bg-primary border-0" role="alert"
            aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="toast-message"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"
                    aria-label="סגור"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/user-app.js?v=9"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            UserApp.initSurvey();
        });
    </script>
</body>

</html>
