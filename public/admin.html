<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>התחברות למערכת ניהול סקר</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="css/admin-styles.css">
</head>
<body class="bg-dark text-white">

    <div class="container d-flex flex-column min-vh-100 justify-content-center align-items-center">
        <div class="card bg-secondary text-white shadow-lg p-5 rounded-4" style="max-width: 400px; width: 100%;">
            <h2 class="text-center mb-4">כניסת מנהל</h2>
            
            <form id="admin-login-form">
                <div class="mb-3">
                    <label for="username" class="form-label">שם משתמש</label>
                    <input type="text" class="form-control bg-dark text-white border-secondary" id="username" required>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">סיסמה</label>
                    <input type="password" class="form-control bg-dark text-white border-secondary" id="password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 mb-3">התחבר</button>
                <div id="login-error" class="text-danger small text-center d-none">שם משתמש או סיסמה שגויים</div>
            </form>
        </div>
    </div>

    <script src="js/admin-app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            AdminApp.initLogin();
        });
    </script>
</body>
</html>
