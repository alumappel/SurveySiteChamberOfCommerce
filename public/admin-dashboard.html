<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>פאנל ניהול - סקר עסקים</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="css/admin-styles.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">פאנל ניהול - סקר עסקים</a>
            <div class="d-flex">
                <button class="btn btn-outline-light me-2" onclick="AdminApp.logout()">התנתק</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-3 mb-4">
                <div class="list-group">
                    <button class="list-group-item list-group-item-action active" id="tab-data" onclick="AdminApp.switchTab('data')">נתונים וייצוא</button>
                    <button class="list-group-item list-group-item-action" id="tab-config" onclick="AdminApp.switchTab('config')">עריכת תוכן סקר</button>
                </div>
            </div>
            
            <!-- Main Content -->
            <div class="col-md-9">
                <!-- Data Tab -->
                <div id="section-data" class="card p-4 shadow-sm mb-4">
                    <h3>נתוני סקר</h3>
                    <p>ניתן לייצא את כל נתוני הסקר (תשובות חלקיות ומלאות) לקובץ אקסל.</p>
                    <div class="mt-3">
                        <button class="btn btn-success" onclick="AdminApp.exportData()">הורדת קובץ אקסל (Excel)</button>
                    </div>
                </div>

                <!-- Config Tab -->
                <div id="section-config" class="card p-4 shadow-sm mb-4 d-none">
                    <h3>עריכת תוכן הסקר (JSON)</h3>
                    <div class="mb-3">
                        <label for="json-editor" class="form-label">ערוך את קובץ ה-JSON הסטטי המנהל את האתר:</label>
                        <textarea id="json-editor" class="form-control text-start" dir="ltr" rows="20" style="font-family: monospace;"></textarea>
                    </div>
                    <button class="btn btn-primary" onclick="AdminApp.saveConfig()">שמור שינויים</button>
                    
                    <h4>סרטון הסבר לטופס הפתיחה</h4>
                    <div class="mt-3">
                        <div class="mb-3">
                            <label for="video-url-input" class="form-label">כתובת URL של סרטון (מיוטיוב, וימאו או קישור ישיר)</label>
                            <div class="input-group">
                                <input type="text" id="video-url-input" class="form-control text-start" dir="ltr" placeholder="https://www.youtube.com/watch?v=...">
                                <button type="button" class="btn btn-secondary" onclick="AdminApp.updateVideoUrl()">עדכן סרטון ב-JSON</button>
                            </div>
                            <div class="form-text text-muted mt-1">
                                הקישור יעודכן אוטומטית בעורך ה-JSON למעלה. זכור ללחוץ על "שמור שינויים" בסיום.
                            </div>
                        </div>
                        <div id="video-preview-container" class="mt-3 p-3 bg-light rounded d-none">
                            <h6 class="mb-2">תצוגה מקדימה:</h6>
                            <div id="video-preview-iframe-wrapper" class="ratio ratio-16x9 mx-auto" style="max-width: 480px; height: 270px;">
                                <!-- Iframe / Video / Image loaded here -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/admin-app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            AdminApp.initDashboard();
        });
    </script>
</body>
</html>
